services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ./config:/config
      - <path_to_books>:/books
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=<your_timezone>
